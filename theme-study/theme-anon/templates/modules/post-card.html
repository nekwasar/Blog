<article th:fragment="postCard(post)" class="item block p-3 mb-3" xmlns:th="http://www.thymeleaf.org">
  <div class="media media-3x2 mb-2">
    <a th:href="@{/{name}(name=${post.metadata.name})}" class="media-content"
       th:style="'background-image: url(' + ${post.spec.cover ?: #theme.assets('/images/default-cover.svg')} + ')'"></a>
    <div th:if="${post.spec.cover}" class="media-overlay overlay-top">
      <span th:if="${!post.categories.isEmpty()}" class="badge text-xs rounded-pill" style="background:var(--color-primary);color:#fff"
            th:text="${post.categories[0].spec.displayName}"></span>
    </div>
  </div>
  <div class="list-content">
    <div class="list-body">
      <div th:if="${!post.categories.isEmpty()}" class="mb-2">
        <a th:href="@{/categories/{name}(name=${post.categories[0].metadata.name})}"
           class="badge text-xs rounded-pill" style="background:var(--color-primary);color:#fff">
          <span th:text="${post.categories[0].spec.displayName}">Category</span>
        </a>
      </div>
      <h2 class="list-title font-title text-md h-2x mb-2">
        <a th:href="@{/{name}(name=${post.metadata.name})}" th:text="${post.spec.title}"></a>
      </h2>
      <p th:if="${post.status?.excerpt}" class="text-xs text-secondary h-2x" th:text="${post.status.excerpt}"></p>
    </div>
    <div class="list-footer d-flex align-items-center justify-content-between text-xs text-secondary mt-2">
      <div class="d-flex align-items-center gap-2">
        <span class="d-flex align-items-center">
          <i data-lucide="user" class="mr-1"></i>
          <span th:text="${post.owner?.displayName}">Author</span>
        </span>
        <span class="mx-1">&middot;</span>
        <span th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}">Date</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="d-flex align-items-center">
          <i data-lucide="eye" class="mr-1"></i>
          <span th:text="${post.stats?.visit ?: 0}">0</span>
        </span>
        <span class="d-flex align-items-center">
          <i data-lucide="message-square" class="mr-1"></i>
          <span th:text="${post.stats?.comment ?: 0}">0</span>
        </span>
        <span class="d-flex align-items-center">
          <i data-lucide="heart" class="mr-1"></i>
          <span th:text="${post.stats?.upvote ?: 0}">0</span>
        </span>
      </div>
    </div>
  </div>
</article>
