<header th:fragment="header" xmlns:th="http://www.thymeleaf.org">
    <div x-data="{
        mobileMenu: false,
        scheme: (() => {
            const stored = localStorage.getItem('color-scheme');
            if (stored === 'dark' || stored === 'light') return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        })(),
        init() {
            this.applyScheme(this.scheme);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('color-scheme')) {
                    this.scheme = e.matches ? 'dark' : 'light';
                    this.applyScheme(this.scheme);
                }
            });
            requestAnimationFrame(() => document.body.classList.remove('no-transition'));
        },
        toggleScheme() {
            this.scheme = this.scheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('color-scheme', this.scheme);
            this.applyScheme(this.scheme);
        },
        applyScheme(s) {
            document.body.setAttribute('data-scheme', s);
            document.documentElement.setAttribute('data-scheme', s);
        }
    }">
        <nav class="site-navbar navbar navbar-dark hide-header-bg">
            <div class="container">
                <a class="navbar-brand magic-hover" href="/" th:title="${site.title}">
                    <img th:src="${site.logo}" th:if="${site.logo}" class="logo" th:alt="${site.title}" />
                    <span th:unless="${site.logo}" class="font-title text-lg fw-bold" th:text="${site.title}">Anon</span>
                </a>

                <ul class="navbar-sub d-flex flex-wrap flex-shrink-0 align-items-center justify-content-end gap-1 gap-md-2 ms-auto">
                    <li class="menu-item">
                        <a href="javascript:;" class="btn btn-link btn-rounded btn-sm btn-icon"
                           @click="toggleScheme()"
                           :aria-label="scheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
                           th:title="#{fragment.header.colorScheme}">
                            <i data-lucide="sun" x-show="scheme === 'dark'" x-cloak class="text-lg"></i>
                            <i data-lucide="moon" x-show="scheme === 'light'" x-cloak class="text-lg"></i>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="javascript:SearchWidget.open()" th:if="${pluginFinder.available('PluginSearchWidget')}"
                           class="search-taggle btn btn-link btn-rounded btn-sm btn-icon" th:title="#{fragment.header.search}">
                            <i data-lucide="search"></i>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="javascript:;" class="btn btn-link btn-rounded btn-sm btn-icon"
                           @click="mobileMenu = !mobileMenu; document.body.classList.toggle('site-overflow', mobileMenu)">
                            <i data-lucide="menu" x-show="!mobileMenu" class="text-lg"></i>
                            <i data-lucide="x" x-show="mobileMenu" class="text-lg"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <aside class="mobile-aside" :class="{ 'open': mobileMenu }" x-show="mobileMenu" x-cloak
               th:with="menus = ${menuFinder.getPrimary()}">
            <div class="aside-overlay" @click="mobileMenu = false; document.body.classList.remove('site-overflow')"></div>
            <div class="aside-body">
                <!-- Menu (scrollable) -->
                <div class="aside-menu flex-grow-1">
                    <ul>
                        <li class="menu-item" th:each="menu : ${menus.menuItems}">
                            <a th:href="${menu.status.href}" th:text="${menu.status.displayName}"
                               @click="mobileMenu = false; document.body.classList.remove('site-overflow')">Menu</a>
                            <a href="javascript:;" class="sub-pointer" th:if="${!#lists.isEmpty(menu.children)}">
                                <i data-lucide="arrow-right"></i>
                            </a>
                            <ul class="sub-menu" th:if="${!#lists.isEmpty(menu.children)}">
                                <li class="menu-item" th:each="child : ${menu.children}">
                                    <a th:href="${child.status.href}" th:text="${child.status.displayName}"
                                       @click="mobileMenu = false; document.body.classList.remove('site-overflow')">Sub</a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>

                <!-- Profile pinned to bottom -->
                <div class="aside-profile flex-shrink-0" style="border-top:1px solid var(--color-muted-3)">
                    <div class="d-flex align-items-center gap-3 px-3 pt-3">
                        <img th:src="${site.logo ?: #theme.assets('/images/default-avatar.svg')}" 
                             th:alt="${site.title}" class="rounded-circle flex-shrink-0" 
                             style="width:40px;height:40px;object-fit:cover" />
                        <span class="font-title text-base fw-bold" th:text="${site.title}">Site Title</span>
                    </div>
                    <div class="d-flex gap-3 px-3 pb-3 pt-3">
                        <a href="https://github.com/nekwasar" target="_blank" class="text-secondary" title="GitHub" @click="mobileMenu = false; document.body.classList.remove('site-overflow')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                        </a>
                        <a href="https://x.com/nekwasar" target="_blank" class="text-secondary" title="Twitter / X" @click="mobileMenu = false; document.body.classList.remove('site-overflow')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733-16z"/><path d="M4 20l6.768-6.768m2.46-2.46L20 4"/></svg>
                        </a>
                        <a href="https://linkedin.com/in/nekwasar" target="_blank" class="text-secondary" title="LinkedIn" @click="mobileMenu = false; document.body.classList.remove('site-overflow')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                        </a>
                    </div>
                </div>
             </div>
        </aside>
     </div>
    <style>
    /* ============================================
       NEBULA GLASS — Futuristic Design System
       Primary: Blue-Black Void  |  Accent: Red-Orange Neon
       Light:  Cosmic Silver     |  Dark:   Deep Space
       ============================================ */

    /* ---------- CSS Variables ---------- */
    :root {
        --accent: #FF3B1F;
        --accent-soft: #FF6B4A;
        --accent-glow: rgba(255,59,31,0.15);
        --accent-neon: rgba(255,59,31,0.35);
        --void-1: #050812;
        --void-2: #090E1A;
        --void-3: #0C1120;
        --mist-1: #F2F4FA;
        --mist-2: #E8ECF5;
        --mist-3: #DFE4F0;
        --text-primary: #1A1D2E;
        --text-secondary: #5A5E72;
        --glass-light: rgba(255,255,255,0.58);
        --glass-dark: rgba(8,11,22,0.62);
        --blur-x: 24px;
        --blur-card: 18px;
        --blur-foot: 14px;
        --radius: 18px;
        --radius-sm: 12px;
        --transition-smooth: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        --border-light: rgba(0,0,0,0.06);
        --border-dark: rgba(255,255,255,0.04);
    }

    /* ---------- Base Reset ---------- */
    body.no-transition, body.no-transition * { transition: none !important; }
    *, *::before, *::after { 
        transition: background-color var(--transition-smooth), color 0.3s ease, 
                    border-color 0.3s ease, transform var(--transition-smooth), 
                    box-shadow var(--transition-smooth), opacity 0.3s ease; 
    }

    /* ---------- Typography ---------- */
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .font-title { font-weight: 600; letter-spacing: -0.01em; }
    .font-number { font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; font-weight: 600; }

    /* ---------- Nav Sizing ---------- */
    .site-navbar .navbar-brand { font-size:1.25rem !important; letter-spacing:-0.01em; }
    .site-navbar .menu-item > a { font-size:0.95rem !important; font-weight:500; }
    .site-navbar .navbar-sub .btn { padding:0.55rem 0.7rem !important; }
    .site-navbar .navbar-sub { gap:0.7rem !important; }
    .site-footer { font-size:0.95rem !important; line-height:2.2; }
    .site-footer .btn, .site-footer a { font-size:0.9rem !important; }

    /* =============================================
       BACKGROUND — Depth Layers + Grid
       ============================================= */

    /* Layer 1: Gradient */
    body {
        background: linear-gradient(165deg, var(--mist-1) 0%, var(--mist-2) 30%, var(--mist-3) 60%, var(--mist-1) 100%) fixed !important;
    }
    body[data-scheme="dark"] {
        background: linear-gradient(165deg, var(--void-1) 0%, var(--void-2) 35%, var(--void-3) 65%, var(--void-1) 100%) fixed !important;
    }

    /* Layer 2: Animated particle grid */
    body::before {
        content:''; position:fixed; inset:0; z-index:-2; pointer-events:none; opacity:0.04;
        background-image: 
            radial-gradient(circle at 25% 25%, #1A1D2E 0.3px, transparent 0.3px),
            radial-gradient(circle at 75% 75%, #1A1D2E 0.4px, transparent 0.4px),
            radial-gradient(circle at 50% 50%, rgba(100,120,160,0.5) 0.2px, transparent 0.2px);
        background-size: 80px 80px, 120px 120px, 60px 60px;
        animation: driftGrid 40s linear infinite;
    }
    body[data-scheme="dark"]::before { opacity:0.08;
        background-image: 
            radial-gradient(circle at 25% 25%, var(--accent) 0.3px, transparent 0.3px),
            radial-gradient(circle at 75% 75%, var(--accent) 0.4px, transparent 0.4px),
            radial-gradient(circle at 50% 50%, rgba(100,120,160,0.5) 0.2px, transparent 0.2px); }
    @keyframes driftGrid {
        0% { background-position: 0 0, 0 0, 0 0; }
        100% { background-position: 80px 80px, -120px 120px, 60px -60px; }
    }

    /* Layer 3: Grain texture */
    body::after {
        content:''; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.025;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    body[data-scheme="dark"]::after { opacity:0.05; }

    /* =============================================
       NAVBAR — Multi-Layer Glass + Neon Line
       ============================================= */
    .site-navbar {
        background: rgba(240,242,248,0.65) !important;
        backdrop-filter: blur(var(--blur-x)) saturate(190%) !important;
        -webkit-backdrop-filter: blur(var(--blur-x)) saturate(190%) !important;
        border-bottom: 1px solid var(--border-light) !important;
        box-shadow: 0 2px 40px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.02) !important;
        position:sticky; top:0; z-index:100;
    }
    body[data-scheme="dark"] .site-navbar {
        background: rgba(5,8,18,0.72) !important;
        border-bottom: 1px solid var(--border-dark) !important;
        box-shadow: 0 2px 40px rgba(0,0,0,0.35), 0 0 30px rgba(255,59,31,0.03) !important;
    }

    /* Navbar bottom line — dark mode only */
    .site-navbar::after {
        content:''; position:absolute; bottom:0; left:0; right:0; height:1px; z-index:101;
        opacity:0; transition:opacity 0.5s ease;
    }
    body[data-scheme="dark"] .site-navbar::after {
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity:0.35;
    }

    /* =============================================
       CARDS — Holographic Glass + Animated Borders
       ============================================= */
    .block, .box-block, .item.block {
        background: var(--glass-light) !important;
        backdrop-filter: blur(var(--blur-card)) saturate(160%) !important;
        -webkit-backdrop-filter: blur(var(--blur-card)) saturate(160%) !important;
        border-radius: var(--radius) !important;
        box-shadow: 0 4px 24px rgba(0,0,0,0.025), 0 1px 3px rgba(0,0,0,0.015) !important;
        position:relative; overflow:hidden;
    }
    body[data-scheme="dark"] .block, 
    body[data-scheme="dark"] .box-block,
    body[data-scheme="dark"] .item.block {
        background: var(--glass-dark) !important;
        box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.15) !important;
    }

    /* === Card Borders === */

    /* Light mode: clean professional border */
    .block::before, .box-block::before, .item.block::before {
        content:''; position:absolute; inset:0; border-radius:inherit; padding:1px; z-index:0; pointer-events:none;
        background: rgba(0,0,0,0.05);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
    }

    /* Dark mode: rainbow animated border */
    body[data-scheme="dark"] .block::before, 
    body[data-scheme="dark"] .box-block::before, 
    body[data-scheme="dark"] .item.block::before {
        padding:1.5px;
        background: conic-gradient(from var(--border-angle), #FF3B1F, #FF6D00, #FFD600, #00E676, #448AFF, #B388FF, #FF3B1F);
        animation: rainbowSpin 4s linear infinite;
    }
    @property --border-angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
    }
    @keyframes rainbowSpin {
        0% { --border-angle: 0deg; }
        100% { --border-angle: 360deg; }
    }

    /* === Holographic Sheen on Hover === */
    .block::after, .box-block::after, .item.block::after {
        content:''; position:absolute; inset:0; border-radius:inherit; z-index:1; pointer-events:none; opacity:0;
        background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.2) 45%, transparent 60%);
        transition: opacity 0.5s ease;
    }
    .block:hover::after, .box-block:hover::after, .item.block:hover::after { opacity:0.5; }
    body[data-scheme="dark"] .block::after, 
    body[data-scheme="dark"] .box-block::after, 
    body[data-scheme="dark"] .item.block::after {
        background: linear-gradient(135deg, transparent 30%, rgba(255,59,31,0.05) 45%, transparent 60%);
    }

    /* Ensure content sits above pseudo-elements */
    .block > *, .box-block > *, .item.block > * { position:relative; z-index:2; }

    /* === Hover Lift === */
    .block:hover, .box-block:hover, .item.block:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 48px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.03) !important;
    }
    body[data-scheme="dark"] .block:hover, 
    body[data-scheme="dark"] .box-block:hover, 
    body[data-scheme="dark"] .item.block:hover {
        box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 40px rgba(255,59,31,0.06) !important;
    }

    /* === Profile Block === */
    .profile-block.box-block { border-radius: 22px !important; }

    /* =============================================
       FORUM TABS + POST CARDS
       ============================================= */
    .forum-tab.block {
        background: rgba(240,242,248,0.55) !important;
        backdrop-filter: blur(14px) saturate(150%) !important;
        -webkit-backdrop-filter: blur(14px) saturate(150%) !important;
        border-radius: var(--radius) var(--radius) 0 0 !important;
        border-bottom: 1px solid var(--border-light) !important;
    }
    body[data-scheme="dark"] .forum-tab.block {
        background: rgba(8,11,22,0.55) !important;
        border-bottom: 1px solid var(--border-dark) !important;
    }

    .forum-tabmenu .item { position:relative; padding:6px 14px; border-radius:8px; font-weight:500; }
    .forum-tabmenu .item::after {
        content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px;
        border-radius:2px; transition:width var(--transition-smooth);
    }
    /* Light mode: subtle underline */
    .forum-tabmenu .item::after { background:#1A1D2E; }
    .forum-tabmenu .item.active::after, .forum-tabmenu .item:hover::after { width:60%; }
    /* Dark mode: accent underline */
    body[data-scheme="dark"] .forum-tabmenu .item::after { background:var(--accent); }
    body[data-scheme="dark"] .forum-tabmenu .item.active, 
    body[data-scheme="dark"] .forum-tabmenu .item:hover { color:var(--accent) !important; text-shadow: 0 0 20px var(--accent-glow); }

    .forum-posts .item.block.p-3 { border-radius:0 !important; }
    .forum-posts .item.block.p-3:last-child { border-radius:0 0 var(--radius) var(--radius) !important; }

    .hover-content {
        overflow:hidden; border-radius:var(--radius-sm);
        transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
    }
    .hover-content:hover { transform: scale(1.025); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
    body[data-scheme="dark"] .hover-content:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.2), 0 0 0 2px var(--accent-glow); }

    /* =============================================
       ACCENT SYSTEM — Dark Mode Only
       ============================================= */

    /* Light mode: clean, professional links */
    a:hover { color: #1A1D2E !important; }
    .site-navbar .menu-item > a:hover { color: #1A1D2E !important; }

    /* Dark mode: neon accents */
    body[data-scheme="dark"] a:hover { color: var(--accent) !important; }
    body[data-scheme="dark"] .site-navbar .menu-item > a:hover { color: var(--accent) !important; }

    /* Like button — neutral in light, neon in dark */
    .like-action, .action-button.like-action { color: inherit; }
    .like-action:hover, .like-action.active { color: #fff !important; background: #1A1D2E !important; border-radius:10px !important; padding:2px 10px !important; }
    body[data-scheme="dark"] .like-action, body[data-scheme="dark"] .action-button.like-action { color: var(--accent) !important; }
    body[data-scheme="dark"] .like-action:hover, body[data-scheme="dark"] .like-action.active { 
        background: var(--accent) !important; box-shadow: 0 0 30px var(--accent-neon) !important; transform:scale(1.08); 
    }

    /* Pagination — neutral in light */
    .page-number.current { background: #1A1D2E !important; color: #fff !important; }
    .page-number:hover { border-color: #1A1D2E !important; color: #1A1D2E !important; }
    body[data-scheme="dark"] .page-number.current { background: var(--accent) !important; box-shadow: 0 2px 16px var(--accent-glow) !important; }
    body[data-scheme="dark"] .page-number:hover { border-color: var(--accent) !important; color: var(--accent) !important; }

    /* Tags */
    .istag { border:1px solid var(--border-light) !important; border-radius:8px !important; padding:4px 12px !important; font-size:0.82rem !important; }
    body[data-scheme="dark"] .istag { border-color:var(--border-dark) !important; }
    .istag:hover { border-color:#1A1D2E !important; background:rgba(26,29,46,0.05) !important; color:#1A1D2E !important; }
    body[data-scheme="dark"] .istag:hover { border-color:var(--accent) !important; background:var(--accent-glow) !important; color:var(--accent) !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background: #1A1D2E; }
    body[data-scheme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
    body[data-scheme="dark"] ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* =============================================
       THEME TOGGLE ICON COLORS
       ============================================= */
    /* Light mode: normal dark icon */
    body:not([data-scheme="dark"]) [data-lucide="sun"],
    body:not([data-scheme="dark"]) [data-lucide="moon"] { color: var(--text-primary); }
    /* Dark mode: neon accent */
    body[data-scheme="dark"] [data-lucide="sun"],
    body[data-scheme="dark"] [data-lucide="moon"] { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-neon)); }

    /* =============================================
       FOOTER — Holographic Glass
       ============================================= */
    .site-footer {
        background: rgba(240,242,248,0.5) !important;
        backdrop-filter: blur(var(--blur-foot)) saturate(140%) !important;
        -webkit-backdrop-filter: blur(var(--blur-foot)) saturate(140%) !important;
        border-top: 1px solid var(--border-light) !important;
        box-shadow: 0 -2px 20px rgba(0,0,0,0.02) !important;
    }
    body[data-scheme="dark"] .site-footer {
        background: rgba(5,8,18,0.55) !important;
        border-top: 1px solid var(--border-dark) !important;
        box-shadow: 0 -2px 20px rgba(0,0,0,0.25) !important;
    }
    .site-footer::before {
        content:''; position:absolute; top:0; left:0; right:0; height:1px;
        background: linear-gradient(90deg, transparent, #1A1D2E, transparent);
        opacity:0; transition:opacity 0.5s ease;
    }
    .site-footer:hover::before { opacity:0.15; }
    body[data-scheme="dark"] .site-footer::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity:0.3; }

    /* =============================================
       MOBILE ASIDE — Heavy Glass
       ============================================= */
    .mobile-aside .aside-body {
        background: rgba(240,242,248,0.82) !important;
        backdrop-filter: blur(32px) saturate(190%) !important;
        -webkit-backdrop-filter: blur(32px) saturate(190%) !important;
        border-left: 1px solid rgba(255,255,255,0.4) !important;
        border-radius: 22px 0 0 22px !important;
    }
    body[data-scheme="dark"] .mobile-aside .aside-body {
        background: rgba(8,12,22,0.86) !important;
        border-left: 1px solid rgba(255,59,31,0.08) !important;
    }
    .mobile-aside .aside-overlay { background: rgba(0,0,0,0.35) !important; backdrop-filter: blur(6px) !important; -webkit-backdrop-filter: blur(6px) !important; }

    /* =============================================
       ANIMATIONS — Staggered + Futuristic
       ============================================= */

    /* Staggered card fade-in */
    .forum-posts .item.block.p-3 {
        animation: cardReveal 0.6s cubic-bezier(0.22,0.61,0.36,1) both;
    }
    .forum-posts .item.block.p-3:nth-child(1) { animation-delay:0s; }
