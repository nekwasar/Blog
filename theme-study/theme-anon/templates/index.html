<!doctype html>
<html th:lang="${#locale.toLanguageTag}"
      xmlns:th="http://www.thymeleaf.org" xmlns:halo="https://www.halo.run">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="robots" content="index,follow" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta name="description" th:content="${site.subtitle ?: site.title}" />
    <meta property="og:title" th:content="${site.title}" />
    <meta property="og:description" th:content="${site.subtitle ?: site.title}" />
    <meta property="og:url" th:content="@{/}" />
    <link rel="alternate" th:href="@{/rss.xml}" type="application/rss+xml" th:title="${site.title}" />
    <link rel="icon" type="image/png" th:if="${site.favicon}" th:href="${site.favicon}" />
    <title th:text="${site.title}">Site Title</title>
    <link rel="stylesheet" href="/themes/theme-anon/assets/plugins/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/plugins/fancybox/fancybox.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/plugins/aos/aos.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/plugins/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/plugins/panzoom/panzoom.toolbar.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/themes/theme-anon/assets/css/animate.min.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/css/reset.css" />
    <link rel="stylesheet" href="/themes/theme-anon/assets/css/style.css" />
  <style>[data-lucide]{width:1.2em;height:1.2em;stroke-width:1.5;flex-shrink:0}[data-lucide].text-lg{width:1.4em;height:1.4em}[data-lucide].text-md{width:1.1em;height:1.1em}[data-lucide].text-xs{width:0.9em;height:0.9em}</style>
</head>
<body class="hidden no-transition">
    <th:block th:replace="~{modules/header :: header}" />

    <main class="site-main h-v-75">
        <div class="container">
            <div class="row g-3">

                <!-- LEFT SIDEBAR -->
                <aside class="sidebar-left col-md-4 col-xl-3 d-none d-md-block">
                    <div class="profile-block box-block block w-100 text-center mb-3">
                        <div class="flex-avatar mx-auto">
                            <img th:src="${site.logo ?: #theme.assets('/images/default-avatar.svg')}" th:alt="${site.title}" />
                        </div>
                        <div class="profile-name font-title" th:text="${site.title}">Site Title</div>
                        <div class="d-flex justify-content-center mt-2">
                            <span class="author-badge font-title fw-bold th:text" th:text="#{widget.profile.title}">Admin</span>
                        </div>
                        <div class="text-secondary text-sm mt-3">
                            <div class="h-2x" th:text="${site.subtitle ?: ''}"></div>
                        </div>
                        <div class="data-block mt-3 mb-3" th:with="stats = ${siteStatsFinder.getStats()}">
                            <div class="row g-2 g-lg-3">
                                <div class="col-6">
                                    <div class="item box-block nopd-block block">
                                        <div class="item-content">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="font-title text-xs text-secondary" th:text="#{widget.profile.posts}">Posts</div>
                                            </div>
                                            <div class="d-flex justify-content-between mt-auto">
                                                <div class="font-number text-xxl lh-1" th:text="${stats?.post ?: 0}">0</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="item box-block nopd-block block">
                                        <div class="item-content">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="font-title text-xs text-secondary" th:text="#{widget.profile.comments}">Comments</div>
                                            </div>
                                            <div class="d-flex justify-content-between mt-auto">
                                                <div class="font-number text-xxl lh-1" th:text="${stats?.comment ?: 0}">0</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="item box-block nopd-block block">
                                        <div class="item-content">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="font-title text-xs text-secondary" th:text="#{widget.profile.upvotes}">Upvotes</div>
                                            </div>
                                            <div class="d-flex justify-content-between mt-auto">
                                                <div class="font-number text-xxl lh-1" th:text="${stats?.upvote ?: 0}">0</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="item box-block nopd-block block">
                                        <div class="item-content">
                                            <div class="d-flex justify-content-between align-items-center">
                                                <div class="font-title text-xs text-secondary" th:text="#{widget.profile.visits}">Visits</div>
                                            </div>
                                            <div class="d-flex justify-content-between mt-auto">
                                                <div class="font-number text-xxl lh-1" th:text="${stats?.visit ?: 0}">0</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Social links -->
                    <div class="social-block box-block block d-none d-md-block w-100 mb-3">
                        <div class="social-list">
                            <a href="https://github.com/nekwasar" target="_blank" class="btn btn-link btn-rounded btn-sm btn-icon" title="GitHub">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                            </a>
                            <a href="https://x.com/nekwasar" target="_blank" class="btn btn-link btn-rounded btn-sm btn-icon" title="Twitter / X">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733-16z"/><path d="M4 20l6.768-6.768m2.46-2.46L20 4"/></svg>
                            </a>
                            <a href="https://linkedin.com/in/nekwasar" target="_blank" class="btn btn-link btn-rounded btn-sm btn-icon" title="LinkedIn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                            </a>
                        </div>
                    </div>
                </aside>

                <!-- MAIN CONTENT -->
                <div class="col-md-8 col-xl-6">
                    <div class="forum-wrapper" th:with="categories = ${categoryFinder.listAll()}, posts = ${postFinder.list(1, 10)}">
                        <!-- Category tabs -->
                        <div class="forum-tab font-title block p-3" th:if="${!#lists.isEmpty(categories)}">
                            <div class="forum-tabmenu">
                                <a href="/" class="item active" th:text="#{common.all}">All</a>
                                <a th:each="cat : ${categories}" th:href="@{/categories/{name}(name=${cat.metadata.name})}"
                                   class="item" th:text="${cat.spec.displayName}">Category</a>
                            </div>
                        </div>

                        <!-- Post cards -->
                        <div class="forum-posts">
                            <div th:each="post : ${posts.items}" th:if="${post.status?.phase == 'PUBLISHED'}">
                                <div class="item block p-3">
                                    <!-- Info bar -->
                                    <div class="item-info d-flex align-items-center justify-content-between gap-3 mb-3">
                                        <div class="info-avatar flex-avatar">
                                            <img th:src="${post.owner?.avatar ?: #theme.assets('/images/default-avatar.svg')}" th:alt="${post.owner?.displayName}" />
                                        </div>
                                        <div class="info-content">
                                            <div class="info-name">
                                                <a th:href="@{/categories/{name}(name=${post.categories[0].metadata.name})}" th:if="${!post.categories.isEmpty()}"
                                                   th:text="${post.categories[0].spec.displayName}" class="text-sm"></a>
                                            </div>
                                            <div class="info-data text-muted text-xs">
                                                <span th:text="${post.owner?.displayName}">Author</span>
                                                <span class="mx-1">·</span>
                                                <span th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}">2024-01-01</span>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Content -->
                                    <div class="item-content">
                                        <div class="item-desc">
                                            <a th:href="@{/{name}(name=${post.metadata.name})}">
                                                <h2 class="font-title text-md" th:text="${post.spec.title}">Post Title</h2>
                                            </a>
                                        </div>
                                        <div class="text-secondary text-sm h-3x mt-1 mt-md-2" th:text="${post.status?.excerpt ?: #strings.abbreviate(post.spec.title, 120)}">
                                            Post excerpt text content goes here...
                                        </div>
                                        <!-- Cover image -->
                                        <div class="item-images mt-2 mt-md-3" th:if="${!#strings.isEmpty(post.spec.cover)}">
                                            <div class="hover-content">
                                                <a th:href="@{/{name}(name=${post.metadata.name})}" data-fancybox>
                                                    <img th:src="${post.spec.cover}" th:alt="${post.spec.title}" class="rounded" />
                                                </a>
                                            </div>
                                        </div>
                                        <!-- Actions bar -->
                                        <div class="item-actions font-number d-flex align-items-center justify-content-evenly mt-3">
                                            <span class="action-button">
                                                <i data-lucide="eye"></i>
                                                <span th:text="${post.stats?.visit ?: 0}">0</span>
                                            </span>
                                            <a th:href="@{/{name}(name=${post.metadata.name})#comments}" class="action-button">
                                                <i data-lucide="message-circle"></i>
                                                <span th:text="${post.stats?.comment ?: 0}">0</span>
                                            </a>
                                            <a href="javascript:;" class="action-button like-action" 
                                               th:attr="data-upvote-name=${post.metadata.name}" x-data="{liked:false}"
                                               @click="!liked && (liked=true, $el.querySelector('span').textContent = parseInt($el.querySelector('span').textContent)+1, $el.classList.add('active'))">
                                                <i data-lucide="heart"></i>
                                                <span th:text="${post.stats?.upvote ?: 0}">0</span>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Empty state -->
                            <div th:if="${posts.items == null || posts.items.isEmpty()}" class="text-center py-5">
                                <div class="text-secondary h3" th:text="#{common.noPosts}">No posts found</div>
                            </div>
                        </div>

                        <!-- Pagination -->
                        <nav th:if="${posts.totalPages > 1}" class="pagination-container mt-3 mt-md-4">
                            <div class="pagination">
                                <a th:if="${posts.hasPrevious()}" th:href="@{/(page=${posts.number - 1})}" class="page-number" rel="prev">
                                    <span th:text="#{common.prev}">Previous</span>
                                </a>
                                <a th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                                   th:href="${i == 0 ? @{/} : @{/(page=${i})}}"
                                   th:text="${i + 1}"
                                   th:class="'page-number' + (${i == posts.number} ? ' current' : '')">1</a>
                                <a th:if="${posts.hasNext()}" th:href="@{/(page=${posts.number + 1})}" class="page-number" rel="next">
                                    <span th:text="#{common.next}">Next</span>
                                </a>
                            </div>
                        </nav>
                    </div>
                </div>

                <!-- RIGHT SIDEBAR -->
                <aside class="sidebar-right col-xl-3 d-none d-xl-block">
                    <!-- Latest posts -->
                    <div class="blog-block box-block block w-100 mb-3" th:with="latest = ${postFinder.list(1, 5)}">
                        <div class="d-flex justify-content-between align-items-center mb-3 mb-xl-4">
                            <div class="font-title text-md" th:text="#{widget.latestPosts.title}">Latest</div>
                        </div>
                        <div class="blog-list font-title">
                            <div th:each="lp : ${latest.items}" class="text-sm h-1x">
                                <a th:href="@{/{name}(name=${lp.metadata.name})}" th:text="${lp.spec.title}">Post Title</a>
                            </div>
                        </div>
                    </div>
                    <!-- Tags -->
                    <div class="tags-block box-block block w-100 mb-3" th:with="tags = ${tagFinder.listAll()}">
                        <div class="d-flex justify-content-between align-items-center mb-3 mb-xl-4">
                            <div class="font-title text-md" th:text="#{widget.tags.title}">Tags</div>
                        </div>
                        <div class="tags-list">
                            <a th:each="t : ${tags}" th:href="@{/tags/{name}(name=${t.metadata.name})}" class="istag" th:text="${t.spec.displayName}">tag</a>
                        </div>
                    </div>
                    <!-- Categories -->
                    <div class="tags-block box-block block w-100 mb-3" th:with="cats = ${categoryFinder.listAll()}">
                        <div class="d-flex justify-content-between align-items-center mb-3 mb-xl-4">
                            <div class="font-title text-md" th:text="#{widget.categories.title}">Categories</div>
                        </div>
                        <div class="cats-list">
                            <a th:each="c : ${cats}" th:href="@{/categories/{name}(name=${c.metadata.name})}" class="d-block text-sm py-1"
                               th:text="|${c.spec.displayName} (${c.status.postCount})|">Category (0)</a>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <th:block th:replace="~{modules/footer :: footer}" />
    <script src="/themes/theme-anon/assets/js/jquery.min.js"></script>
    <script defer src="/themes/theme-anon/assets/js/alpine.min.js"></script>
    <script src="/themes/theme-anon/assets/plugins/aos/aos.js"></script>
    <script src="/themes/theme-anon/assets/plugins/swiper/swiper-bundle.min.js"></script>
    <script src="/themes/theme-anon/assets/plugins/fancybox/fancybox.umd.js"></script>
    <script src="/themes/theme-anon/assets/plugins/panzoom/panzoom.toolbar.umd.js"></script>
    <script src="/themes/theme-anon/assets/plugins/theia-sticky-sidebar/ResizeSensor.min.js"></script>
    <script src="/themes/theme-anon/assets/plugins/theia-sticky-sidebar/theia-sticky-sidebar.min.js"></script>
    <script src="/themes/theme-anon/assets/js/nicetheme.js"></script>
    <script>AOS.init();</script>
    <div class="scroll-toolbar"><div class="scroll-backtotop" style="width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(180,185,200,0.85);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%) saturate(140%);border:1px solid rgba(0,0,0,0.06);border-radius:50%;cursor:pointer;transition:all 0.3s ease"><i data-lucide="arrow-up"></i></div></div>
  <script>lucide.createIcons();</script>
</body>
</html>
