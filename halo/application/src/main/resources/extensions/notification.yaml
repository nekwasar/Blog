apiVersion: notification.halo.run/v1alpha1
kind: NotifierDescriptor
metadata:
  name: default-email-notifier
spec:
  displayName: "Email Notification"
  description: "Send notifications to users via email"
  notifierExtName: "halo-email-notifier"
  senderSettingRef:
    name: "notifier-setting-for-email"
    group: "sender"
---
apiVersion: v1alpha1
kind: Setting
metadata:
  name: notifier-setting-for-email
spec:
  forms:
    - group: sender
      label: Sender Settings
      formSchema:
        - $formkit: checkbox
          label: "Enable Email Notifier"
          value: false
          name: enable
        - $formkit: verificationForm
          if: "$enable"
          action: /apis/console.api.notification.halo.run/v1alpha1/notifiers/default-email-notifier/verify-connection
          label: Test Email
          children:
            - $formkit: text
              label: "Username"
              name: username
              validation: required
            - $formkit: text
              if: "$enable"
              label: "Sender Address"
              name: "sender"
              help: "Leave empty if username is the actual sender address"
            - $formkit: password
              label: "Password"
              name: password
              validation: required
            - $formkit: text
              label: "Display Name"
              name: displayName
            - $formkit: text
              label: "SMTP Server Host"
              name: host
              validation: required
            - $formkit: text
              label: "Port"
              name: port
              validation: required
            - $formkit: select
              label: "Encryption"
              name: encryption
              value: "SSL"
              options:
                - label: "SSL"
                  value: "SSL"
                - label: "TLS"
                  value: "TLS"
                - label: "None"
                  value: "NONE"
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: new-comment-on-post
  annotations:
    rbac.authorization.halo.run/ui-permissions: |
      [ "uc:posts:publish" ]
spec:
  displayName: "New comment on my post"
  description: "When a reader leaves a new comment on your post, you will receive a notification. This helps you stay engaged with your audience."
  properties:
    - name: postName
      type: string
      description: "The name of the post."
    - name: postOwner
      type: string
      description: "The user name of the post owner."
    - name: postTitle
      type: string
    - name: postUrl
      type: string
    - name: commenter
      type: string
      description: "The display name of the commenter."
    - name: commentName
      type: string
      description: "The name of the comment."
    - name: content
      type: string
      description: "The content of the comment."
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: new-comment-on-single-page
  annotations:
    rbac.authorization.halo.run/ui-permissions: |
      [ "system:singlepages:manage" ]
spec:
  displayName: "New comment on my page"
  description: "When a reader leaves a new comment on your custom page, you will receive a notification."
  properties:
    - name: pageName
      type: string
      description: "The name of the single page."
    - name: pageOwner
      type: string
      description: "The user name of the page owner."
    - name: pageTitle
      type: string
    - name: pageUrl
      type: string
    - name: commenter
      type: string
      description: "The display name of the commenter."
    - name: commentName
      type: string
      description: "The name of the comment."
    - name: content
      type: string
      description: "The content of the comment."
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: someone-replied-to-you
spec:
  displayName: "Someone replied to me"
  description: "When another user replies to your comment, you will receive a notification."
  properties:
    - name: commentName
      type: string
      description: "The name of the comment."
    - name: commentSubjectTitle
      type: string
    - name: commentSubjectUrl
      type: string
    - name: quoteContent
      type: string
      optional: true
      description: "The content of quoted reply."
    - name: isQuoteReply
      type: boolean
    - name: commentContent
      type: string
    - name: repliedOwner
      type: string
      description: "The owner of the comment or reply that has been replied to."
    - name: replyOwner
      type: string
      description: "The user who created the current reply."
    - name: replier
      type: string
      description: "The display name of the replier."
    - name: replyName
      type: string
      description: "The name of the reply."
    - name: content
      type: string
      description: "The content of the reply."
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: email-verification
  labels:
    halo.run/hidden: "true"
spec:
  displayName: "Email Verification"
  description: "When your email is used to register an account, you will receive an email with a verification code to verify your email address."
  properties:
    - name: username
      type: string
      description: "The username of the user."
    - name: code
      type: string
      description: "The verification code."
    - name: expirationAtMinutes
      type: string
      description: "The expiration minutes of the verification code, such as 5 minutes."
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: reset-password-by-email
  labels:
    halo.run/hidden: "true"
spec:
  displayName: "Reset password via email"
  description: "When you request a password reset via email, you will receive an email with a password reset link."
  properties:
    - name: username
      type: string
      description: "The username of the user."
    - name: link
      type: string
      description: "The reset link."
    - name: expirationAtMinutes
      type: string
      description: "The expiration minutes of the reset link, such as 30 minutes."
---
apiVersion: notification.halo.run/v1alpha1
kind: ReasonType
metadata:
  name: new-device-login
spec:
  displayName: "New device login"
  description: "When your account is used to sign in from a new device, you will receive a notification."
  properties:
    - name: os
      type: string
      description: "The operating system of the device."
    - name: browser
      type: string
      description: "The browser of the device."
    - name: ipAddress
      type: string
      description: "The IP address of the device."
    - name: loginTime
      type: string
      description: "The login time of the device."
    - name: principalName
      type: string
      description: "The principal name of the device."
