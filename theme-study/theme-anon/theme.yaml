apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-anon
spec:
  displayName: Anon
  author:
    name: anonymous
    website: https://github.com
  description: A privacy-first, anonymous-friendly Halo blog theme. No signup required for comments or likes.
  logo: /themes/theme-anon/assets/images/logo.png
  homepage: https://github.com
  repo: https://github.com
  version: 1.0.0
  requires: ">=2.20.0"
  settingName: "theme-anon-setting"
  configMapName: "theme-anon-configMap"
  license:
    - name: "MIT"
      url: "https://opensource.org/licenses/MIT"
  customTemplates:
    page:
      - name: "Links"
        description: "Links page template"
        file: links.html
      - name: "Moments"
        description: "Status / micro-blog page template"
        file: moments.html
      - name: "Gallery"
        description: "Photo gallery page template"
        file: photos.html
