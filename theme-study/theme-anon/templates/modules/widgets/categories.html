<div th:fragment="widget" class="blog-block box-block block w-100 mb-3" xmlns:th="http://www.thymeleaf.org"
     th:with="categories=${categoryFinder.listAll()}">
  <div class="d-flex justify-content-between align-items-center mb-3 mb-xl-4">
    <h5 class="font-title text-md mb-0" th:text="#{widget.categories.title}">Categories</h5>
    <a th:href="@{/categories}" class="text-xs text-secondary" th:text="#{common.all}">All</a>
  </div>
  <div class="cats-list" th:if="${!categories.isEmpty()}">
    <div class="row g-2">
      <div th:each="cat : ${categories}" class="col-6">
        <div class="item block media media-2x1 rounded mb-2">
          <a th:href="@{/categories/{name}(name=${cat.metadata.name})}" class="media-content rounded"
             th:style="${cat.spec.cover} ? 'background-image: url(' + ${cat.spec.cover} + ')' : ''"></a>
          <div class="item-content d-flex align-items-end">
            <div>
              <a th:href="@{/categories/{name}(name=${cat.metadata.name})}" class="text-sm font-title d-block" th:text="${cat.spec.displayName}">Category</a>
              <span class="text-xs opacity-75 text-white" th:text="${cat.status.postCount ?: 0} + ' posts'">0 posts</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <p th:if="${categories.isEmpty()}" class="text-xs text-secondary mb-0" th:text="#{common.noPosts}">No categories</p>
</div>
