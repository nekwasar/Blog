apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-someone-replied-to-you
spec:
  reasonSelector:
    reasonType: someone-replied-to-you
    language: default
  template:
    title: "[(${replier})] replied to your comment"
    rawBody: |
      Hello [(${subscriber.displayName})],

        [(${replier})] replied to your comment "[(${isQuoteReply ? quoteContent : commentContent})]":

        [(${content})]
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|Hello ${subscriber.displayName}:|"></p>
        </div>
        <div class="body">
          <p>
            <span th:text="${replier}"></span> replied to your comment
            <span th:text="|"${isQuoteReply ? quoteContent : commentContent}"|"></span>:
          </p>
          <p>Your comment:</p>
          <div class="quoted-content" th:utext="${isQuoteReply ? quoteContent : commentContent}"></div>
          <p>Reply:</p>
          <div class="content" th:utext="${content}"></div>
        </div>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-email-verification
spec:
  reasonSelector:
    reasonType: email-verification
    language: default
  template:
    title: "Email Verification - [(${site.title})]"
    rawBody: |
      [[(${site.title})]] Your email verification code is: [(${code})]. Please complete verification within [(${expirationAtMinutes})] minutes.
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|Hello ${username}:|"></p>
        </div>
        <div class="body">
          <p>Use the following OTP to verify your email address.</p>
          <div class="verify-code" style="font-size:24px;line-height:24px;color:#333;">
            <b th:text="${code}"></b>
          </div>
          <p th:text="|The OTP is valid for ${expirationAtMinutes} minutes.|"></p>
          <p>If you did not attempt to verify your email address, please ignore this email.</p>
        </div>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-reset-password-by-email
spec:
  reasonSelector:
    reasonType: reset-password-by-email
    language: default
  template:
    title: "Password Reset - [(${site.title})]"
    rawBody: |
      [[(${site.title})]] You have requested a password reset. Use this link to reset your password: [(${link})]. The link is valid for [(${expirationAtMinutes})] minutes.
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|Hello ${username}:|"></p>
        </div>
        <div class="body">
          <p>You have requested a password reset. Click the link below to reset your password:</p>
          <div class="reset-link" style="line-height:24px;">
            <span th:text="${link}"></span>
          </div>
          <p th:text="|The link is valid for ${expirationAtMinutes} minutes. Please complete the reset promptly.|"></p>
          <p>If you did not request a password reset, please ignore this email.</p>
        </div>
      </div>
---
apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-new-device-login
spec:
  reasonSelector:
    reasonType: new-device-login
    language: default
  template:
    title: "Your [(${site.title})] account was used to sign in on [(${os})]"
    rawBody: |
      Hello [(${subscriber.displayName})],

        Your [(${site.title})] account was used to sign in on [(${os})] using [(${browser})].
        Time: [(${loginTime})]
        IP Address: [(${ipAddress})]
        If this was you, please ignore this email.
        If you haven't signed in recently and believe someone may have accessed your account, please reset your password immediately.
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|Hello ${subscriber.displayName}:|"></p>
        </div>
        <div class="body">
          <p th:text="|Your ${site.title} account was used to sign in on ${os} using ${browser}:|"></p>
          <div class="device-info">
            <p th:text="|Time: ${loginTime}|"></p>
            <p th:text="|IP Address: ${ipAddress}|"></p>
          </div>
          <p>If this was you, please ignore this email.</p>
          <p th:text="|If you haven't signed in recently and believe someone may have accessed your account, please reset your password immediately.|"></p>
        </div>
      </div>
