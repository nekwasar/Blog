apiVersion: notification.halo.run/v1alpha1
kind: NotificationTemplate
metadata:
  name: template-new-comment-on-post
spec:
  reasonSelector:
    reasonType: new-comment-on-post
    language: default
  template:
    title: "[(${commenter})] commented on your post \"[(${postTitle})]\""
    rawBody: |
      Hello [(${subscriber.displayName})],

        [(${commenter})] commented on your post "[(${postTitle})]":

        [(${content})]
    htmlBody: |
      <div class="notification-content">
        <div class="head">
          <p class="honorific" th:text="|Hello ${subscriber.displayName}:|"></p>
        </div>
        <div class="body">
          <p>
            <span th:text="${commenter}"></span> commented on your post
            <a th:href="${postUrl}" target="_blank" th:text="|${postTitle}|"></a>:
          </p>
          <div class="content" th:utext="${content}"></div>
        </div>
        <div></div>
      </div>
---
