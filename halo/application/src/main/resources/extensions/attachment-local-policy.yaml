apiVersion: storage.halo.run/v1alpha1
kind: PolicyTemplate
metadata:
  name: local
spec:
  displayName: Local Storage
  settingName: local-policy-template-setting
---
apiVersion: storage.halo.run/v1alpha1
kind: Policy
metadata:
  name: default-policy
  finalizers:
    - system-protection
spec:
  displayName: Local Storage
  templateName: local
  configMapName: default-policy-config
---
apiVersion: v1alpha1
kind: ConfigMap
metadata:
  name: default-policy-config
  labels:
    storage.halo.run/policy-owner: default-policy
    halo.run/do-not-overwrite: "true"
data:
  default: '{"location":""}'
---
apiVersion: v1alpha1
kind: Setting
metadata:
  name: local-policy-template-setting
spec:
  forms:
    - group: default
      label: Default
      formSchema:
        - $formkit: text
          name: location
          label: Storage Location
          help: Subdirectory under ~/.halo2/attachments/upload
        - $formkit: text
          name: maxFileSize
          label: Max File Size
          validation: [["matches", '/^(0|[1-9]\d*)(?:[KMG]B)?$/']]
          validation-visibility: "live"
          validation-messages:
            matches: "Invalid format. Use: integer + uppercase unit (KB, MB, GB)"
          help: "0 means no limit. Examples: 5KB, 10MB, 1GB"
        - $formkit: checkbox
          name: allowedFileTypes
          label: File Type Restrictions
          help: Restrict allowed file types for upload
          options:
            - label: No Restrictions
              value: ALL
            - label: Images
              value: IMAGE
            - label: SVG
              value: SVG
            - label: Video
              value: VIDEO
            - label: Audio
              value: AUDIO
            - label: Documents
              value: DOCUMENT
            - label: Archives
              value: ARCHIVE
        - $formkit: checkbox
          name: alwaysRenameFilename
          id: alwaysRenameFilename
          label: Always Rename Files
          help: If checked, uploaded files will be renamed
          value: false
        - $formkit: group
          if: $get(alwaysRenameFilename).value
          id: renameStrategy
          name: renameStrategy
          label: Rename Strategy
          value:
            method: RANDOM
            randomLength: 32
          children:
            - $formkit: radio
              name: method
              label: Rename Method
              options:
                - label: Random String
                  value: RANDOM
                - label: UUID
                  value: UUID
                - label: Timestamp (milliseconds)
                  value: TIMESTAMP
            - $formkit: number
              number: integer
              if: "$value.method === RANDOM"
              name: randomLength
              id: randomLength
              label: Random Filename Length
              help: Default is 32. Due to filename length limits, the range is [8, 64].
              validation: "between:8,64"
              validation-visibility: live
              min: 8
              max: 64
            - $formkit: checkbox
              name: excludeOriginalFilename
              label: Exclude Original Filename
              help: If checked, the renamed file will not include the original filename
---
apiVersion: storage.halo.run/v1alpha1
kind: Group
metadata:
  name: user-avatar-group
  labels:
    halo.run/hidden: "true"
  finalizers:
    - system-protection
spec:
  displayName: UserAvatar
