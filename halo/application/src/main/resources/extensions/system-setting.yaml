apiVersion: v1alpha1
kind: Setting
metadata:
  name: system
spec:
  forms:
    - group: basic
      label: Basic
      formSchema:
        - $formkit: text
          label: "Site Title"
          name: title
          validation: required
        - $formkit: text
          label: "Site Subtitle"
          name: subtitle
        - $formkit: attachment
          label: Logo
          name: logo
          width: "4rem"
          accepts:
            - "image/*"
        - $formkit: attachment
          label: Favicon
          name: favicon
          width: "4rem"
          accepts:
            - "image/*"
        - $formkit: select
          label: "Preferred Language"
          name: language
          value: "zh-CN"
          options:
            - label: "English"
              value: "en"
            - label: "Español"
              value: "es"
            - label: "Simplified Chinese"
              value: "zh-CN"
            - label: "Traditional Chinese"
              value: "zh-TW"
    - group: post
      label: Post Settings
      formSchema:
        - $formkit: number
          label: "Posts per page on post list"
          name: postPageSize
          value: 10
          min: 1
          max: 100
          validation: required | max:100
        - $formkit: number
          label: "Posts per page on archive"
          name: archivePageSize
          value: 10
          min: 1
          max: 100
          validation: required | max:100
        - $formkit: number
          label: "Posts per page on category"
          name: categoryPageSize
          value: 10
          min: 1
          max: 100
          validation: required | max:100
        - $formkit: number
          label: "Posts per page on tag"
          name: tagPageSize
          value: 10
          min: 1
          max: 100
          validation: required
        - $formkit: number
          label: "Posts per page on author"
          name: authorPageSize
          value: 10
          min: 1
          max: 100
          validation: required
        - $formkit: select
          label: "Slug Generation Strategy"
          name: slugGenerationStrategy
          value: "generateByTitle"
          options:
            - label: "From title"
              value: "generateByTitle"
            - label: "Timestamp"
              value: "timestamp"
            - label: "Short UUID"
              value: "shortUUID"
            - label: "UUID"
              value: "UUID"
          help: This option only applies to new posts. Changing it will not affect existing posts.
        - $formkit: attachmentPolicySelect
          name: attachmentPolicyName
          label: "Attachment Storage Policy"
          value: "default-policy"
          help: Specifies the default attachment storage policy for the post editor (deprecated, use the attachment configuration in attachment settings instead)
        - $formkit: attachmentGroupSelect
          name: attachmentGroupName
          label: "Attachment Storage Group"
          value: ""
          help: Specifies the default attachment storage group for the post editor (deprecated, use the attachment configuration in attachment settings instead)
    - group: seo
      label: SEO Settings
      formSchema:
        - $formkit: checkbox
          name: blockSpiders
          label: "Block Search Engines"
          value: false
          help: 'Adds <meta name="robots" content="noindex" /> to all pages to block search engine indexing. Note that not all search engines respect this directive.'
        - $formkit: textarea
          name: keywords
          label: "Site Keywords"
          help: "Major search engines no longer use this meta tag, so it is generally not recommended. This option may be removed in a future version."
          auto-height: true
        - $formkit: textarea
          name: description
          label: "Site Description"
          help: "Only applies to the homepage. Other pages will auto-generate descriptions based on their content."
          auto-height: true
    - group: user
      label: User Settings
      formSchema:
        - $formkit: checkbox
          name: allowRegistration
          id: allowRegistration
          key: allowRegistration
          label: "Allow Registration"
          value: false
        - $formkit: checkbox
          name: mustVerifyEmailOnRegistration
          label: "Require Email Verification on Registration"
          if: "$get(allowRegistration).value === true"
          help: "Requires the email notifier to be properly configured."
          value: false
        - $formkit: textarea
          name: protectedUsernames
          label: "Reserved Usernames"
          if: "$get(allowRegistration).value === true"
          help: Reserved usernames that cannot be used for registration or profile editing. Separate multiple entries with commas. Leave empty for no restriction.
          value: "admin,administrator,root,system,superuser,guest,test,demo,user,backup,ftp,www,manager,support,service,api"
        - $formkit: roleSelect
          name: defaultRole
          label: "Default Role"
          validation: "required"
          if: "$get(allowRegistration).value === true"
          help: The role assigned to new users by default after registration.
        - $formkit: attachmentPolicySelect
          name: avatarPolicy
          label: "Avatar Storage Policy"
          value: "default-policy"
          help: Specifies the storage policy for user avatars (deprecated, use the avatar attachment configuration in attachment settings instead)
        - $formkit: attachmentPolicySelect
          name: ucAttachmentPolicy
          label: "User Center Attachment Policy"
          value: "default-policy"
          help: Specifies the storage policy for attachments uploaded from the user center (deprecated, use the user center attachment configuration in attachment settings instead)
    - group: attachment
      label: Attachment Settings
      formSchema:
        - $formkit: group
          name: console
          label: Admin Attachment Settings
          help: Set the default storage policy and group for attachments uploaded directly from the admin console
          children:
            - $formkit: attachmentPolicySelect
              name: policyName
              label: "Storage Policy"
              auto-select: false
            - $formkit: attachmentGroupSelect
              name: groupName
              label: "Storage Group"
              auto-select: false
              clearable: true
        - $formkit: group
          name: uc
          label: User Center Attachment Settings
          help: Set the default storage policy and group for attachments uploaded from the user center. For security, it is recommended to restrict file types and sizes for the selected storage policy.
          children:
            - $formkit: attachmentPolicySelect
              name: policyName
              label: "Storage Policy"
              auto-select: false
            - $formkit: attachmentGroupSelect
              name: groupName
              label: "Storage Group"
              auto-select: false
              clearable: true
        - $formkit: group
          name: avatar
          label: Avatar Attachment Settings
          help: Set the storage policy for user avatars. For security, it is recommended to restrict file types and sizes for the selected storage policy.
          children:
            - $formkit: attachmentPolicySelect
              name: policyName
              label: "Storage Policy"
    - group: comment
      label: Comment Settings
      formSchema:
        - $formkit: checkbox
          name: enable
          value: true
          label: "Enable Comments"
        - $formkit: checkbox
          name: requireReviewForNew
          value: true
          label: "Require Review for New Comments"
          help: When enabled, new comments require admin approval before being displayed.
        - $formkit: checkbox
          name: systemUserOnly
          value: true
          label: "Registered users only"
    - group: routeRules
      label: Theme Route Settings
      formSchema:
        - $formkit: checkbox
          label: "Disable Theme Preview"
          value: false
          name: disableThemePreview
          help: "When disabled, users without theme management permissions cannot preview inactive themes via URL parameters."
        - $formkit: text
          label: "Category Route Prefix"
          value: "categories"
          name: categories
          validation: required | alphanumeric
        - $formkit: text
          label: "Tag Route Prefix"
          value: "tags"
          name: tags
          validation: required | alphanumeric
        - $formkit: text
          label: "Archive Route Prefix"
          value: "archives"
          name: archives
          validation: required | alphanumeric
        - $formkit: select
          label: Post Detail Page URL Pattern
          value: "/archives/{slug}"
          options:
            - label: "/archives/{slug}"
              value: "/archives/{slug}"
            - label: "/archives/{name}"
              value: "/archives/{name}"
            - label: "/?p={name}"
              value: "/?p={name}"
            - label: "/?p={slug}"
              value: "/?p={slug}"
            - label: "/{year}/{slug}"
              value: '/{year:\d{4}}/{slug}'
            - label: "/{year}/{month}/{slug}"
              value: '/{year:\d{4}}/{month:\d{2}}/{slug}'
            - label: "/{year}/{month}/{day}/{slug}"
              value: '/{year:\d{4}}/{month:\d{2}}/{day:\d{2}}/{slug}'
            - label: "/categories/{categorySlug}/{slug}"
              value: "/categories/{categorySlug}/{slug}"
          name: post
          validation: required
    - group: codeInjection
      label: Code Injection
      formSchema:
        - $formkit: code
          language: html
          height: 200px
          label: "Global Head Tags"
          name: globalHead
          help: "Inject code into the head section of all pages."
        - $formkit: code
          language: html
          height: 200px
          label: "Content Page Head Tags"
          name: contentHead
          help: "Inject code into the head section of posts and custom pages."
        - $formkit: code
          language: html
          height: 200px
          label: "Footer"
          name: footer
          help: "Inject code into the footer section of all pages."
